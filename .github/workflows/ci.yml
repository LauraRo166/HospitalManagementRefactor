name: CI - Build, Test, Coverage and Sonar

on:
  push:
    branches:
      - continuous-integration
  pull_request:
    branches:
      - master

jobs:
  build-test-sonar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: maven

      - name: Build and run tests with coverage
        run: mvn -B -Pcoverage clean verify

      - name: Analyze with SonarCloud
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.projectKey=csdt-eci_HospitalManagementRefactor
            -Dsonar.organization=csdt-eci
            -Dsonar.branch.name=${{ github.ref_name }}

      - name: 🤖 Bot - Comentar resultado en PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            // Elimina comentarios anteriores del bot para no acumular
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('🤖 CI Report')
            );
            if (botComment) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
              });
            }

            const status = '${{ job.status }}' === 'success' ? '✅' : '❌';
            const sonarUrl = 'https://sonarcloud.io/project/overview?id=${{ secrets.SONAR_PROJECT_KEY }}';

            const body = `## 🤖 CI Report

            | Step | Estado |
            |------|--------|
            | 🔨 Build | ${status} |
            | 🧪 Unit Tests | ${status} |
            | 🔍 Sonar Analysis | ${status} [Ver reporte](${sonarUrl}) |

            **Commit:** \`${{ github.sha }}\`
            **Branch:** \`${{ github.head_ref }}\`
            **Ejecutado por:** @${{ github.actor }}

            > _Actualizado automáticamente con cada push al PR_`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

