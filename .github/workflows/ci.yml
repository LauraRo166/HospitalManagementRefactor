name: CI - Build, Test, Coverage and Sonar

on:
  push:
    branches:
      - continuous-integration
  pull_request:
    branches:
      - master

jobs:
  build-test-sonar:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: maven

      - name: Build and run tests with coverage
        run: mvn -B -Pcoverage clean verify

      - name: Analyze with SonarCloud
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.projectKey=CSDT-ECI_HospitalManagementRefactor
            -Dsonar.organization=csdt-eci
            ${{ github.event_name == 'pull_request' &&
              format('-Dsonar.pullrequest.key={0} -Dsonar.pullrequest.branch={1} -Dsonar.pullrequest.base={2}',
                github.event.pull_request.number,
                github.head_ref,
                github.base_ref)
              || format('-Dsonar.branch.name={0}', github.ref_name) }}

      - name: 🤖 Bot - Comentar resultado en PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            // Elimina comentarios anteriores del bot para no acumular
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('🤖 CI Report')
            );
            if (botComment) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
              });
            }

            // Obtén los datos del PR y commits
            const { data: prData } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const { data: commits } = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 5,
            });

            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 10,
            });

            const status = '${{ job.status }}' === 'success' ? '✅' : '❌';
            const sonarUrl = 'https://sonarcloud.io/project/overview?id=CSDT-ECI_HospitalManagementRefactor';

            // Construye lista de commits
            const commitsList = commits.map(c => `- \`${c.sha.substring(0, 7)}\` ${c.commit.message.split('\\n')[0]}`).join('\\n');

            // Construye lista de archivos modificados
            const filesList = files.map(f => `- ${f.status.padEnd(8)} \`${f.filename}\``).join('\\n');

            const body = `## 🤖 CI Report

            | Step | Estado |
            |------|--------|
            | 🔨 Build | ${status} |
            | 🧪 Unit Tests | ${status} |
            | 🔍 Sonar Analysis | ${status} [Ver reporte](${sonarUrl}) |

            ---

            ### 📝 Cambios en este PR

            **Commits:**
            ${commitsList}

            **Archivos Modificados (${files.length}):**
            ${filesList}

            ---

            **Commit:** \`${{ github.sha }}\`
            **Branch:** \`${{ github.head_ref }}\` → \`${{ github.base_ref }}\`
            **Ejecutado por:** @${{ github.actor }}

            > _Actualizado automáticamente con cada push al PR_`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

